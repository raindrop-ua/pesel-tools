<header>
  <div class="main-block">
    <button
      class="burger"
      type="button"
      (click)="onMenuToggle()"
      aria-label="Toggle menu"
      aria-controls="mobile-navigation"
      [attr.aria-expanded]="menuOpen()"
    >
      <span class="line"></span>
      <span class="line"></span>
      <span class="line"></span>
    </button>
    @if (menuOpen()) {
      <nav id="mobile-navigation" class="mobile-navigation" aria-label="Mobile">
        <ul>
          @for (item of navigation; track item.path) {
            <li>
              <a
                class="link"
                [routerLink]="item.path"
                [class.active]="isLinkActive(item.path)"
                [attr.aria-current]="isLinkActive(item.path) ? 'page' : null"
                (click)="onMenuClose()"
              >
                {{ item.label }}
              </a>
            </li>
          }
        </ul>
      </nav>
    }
    <div class="logo">
      <a class="logo-link" [routerLink]="[AppRouteEnum.Home]"> PESEL Tools </a>
    </div>
    <nav class="navigation" aria-label="Main">
      <ul>
        @for (item of navigation; track item.path) {
          <li>
            <a
              class="link"
              [routerLink]="item.path"
              [class.active]="isLinkActive(item.path)"
              [attr.aria-current]="isLinkActive(item.path) ? 'page' : null"
            >
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>
  </div>
  <app-theme-switcher />
</header>
@if (menuOpen()) {
  <button
    type="button"
    class="overlay"
    aria-label="Close menu"
    (click)="onMenuClose()"
  ></button>
}
