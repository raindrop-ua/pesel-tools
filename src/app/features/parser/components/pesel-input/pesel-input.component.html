<div class="input-control">
  <input
    name="pesel"
    type="text"
    inputmode="numeric"
    pattern="[0-9]*"
    autocomplete="off"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-describedby]="ariaDescribedBy()"
    [placeholder]="placeholder()"
    [value]="value"
    [disabled]="disabled"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  <app-toolbar>
    <app-paste-button (result)="onPasteResult($event)" />
  </app-toolbar>
</div>
