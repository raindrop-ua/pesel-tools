<div class="input-control">
  <input
    #nativeInput
    type="text"
    inputmode="numeric"
    pattern="[0-9]*"
    autocomplete="off"
    [attr.aria-label]="ariaLabel() || placeholder()"
    [placeholder]="placeholder()"
    [value]="value"
    [disabled]="disabled"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
</div>
