<button
  type="button"
  class="tool-btn"
  [disabled]="disabled()"
  [title]="titleToShow()"
  (click)="handleClick()"
  aria-live="polite"
>
  <span class="sr-only">{{ srTextToShow() }}</span>
  <svg
    [icon]="iconToShow()"
    width="24"
    height="24"
    stroke="currentColor"
    stroke-width="2"
  ></svg>
</button>
